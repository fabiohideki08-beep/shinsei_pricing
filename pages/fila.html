<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Shinsei Pricing - Fila de aprovação</title>
<style>
:root{--bg:#0b1020;--card:#121a31;--card2:#17213d;--text:#eef2ff;--muted:#9fb0d9;--line:#263458;--accent:#4f8cff;--ok:#16a34a;--danger:#ef4444;--warn:#f59e0b}
*{box-sizing:border-box} body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(180deg,#0a1020,#0d1630);color:var(--text)}
.wrap{max-width:1400px;margin:0 auto;padding:22px}.topbar{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:18px;background:rgba(18,26,49,.95);border:1px solid var(--line);border-radius:18px;padding:16px 18px;position:sticky;top:16px;z-index:10}
.brand h1{margin:0;font-size:24px}.brand p{margin:4px 0 0;color:var(--muted);font-size:14px}.top-actions{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.btn{border:none;background:var(--accent);color:#fff;padding:11px 14px;border-radius:12px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:8px}.btn.secondary{background:transparent;border:1px solid var(--line);color:var(--text)} .btn.success{background:var(--ok)} .btn.danger{background:var(--danger)}
.pill{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;font-size:12px;font-weight:700;border:1px solid var(--line);background:var(--card2)}
.grid{display:grid;gap:16px}.item{background:rgba(18,26,49,.95);border:1px solid var(--line);border-radius:22px;padding:18px}
.item-head{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:14px}.title{font-size:20px;font-weight:700;margin:0 0 6px}.meta{display:flex;gap:10px;flex-wrap:wrap}
.summary{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:16px}.metric{background:var(--card2);border:1px solid var(--line);border-radius:16px;padding:14px}.metric .label{color:var(--muted);font-size:12px}.metric .value{font-size:20px;font-weight:700;margin-top:8px}
.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:16px} table{width:100%;border-collapse:collapse;min-width:1200px} th,td{padding:10px 12px;border-bottom:1px solid var(--line);font-size:13px;text-align:left;vertical-align:top} th{background:#10182f}
details{margin-top:14px} details>summary{cursor:pointer;color:#c9d7ff;font-weight:700}.empty{background:rgba(18,26,49,.95);border:1px dashed var(--line);border-radius:22px;padding:40px;text-align:center;color:var(--muted)} .mini{font-size:12px;color:var(--muted)} .neg{color:#fca5a5;font-weight:700}
@media (max-width:1200px){.summary{grid-template-columns:repeat(2,1fr)}} @media (max-width:700px){.summary{grid-template-columns:1fr}.topbar{flex-direction:column;align-items:flex-start}}
</style></head><body>
<div class="wrap"><div class="topbar"><div class="brand"><h1>Fila de aprovação</h1><p>Agora com bloqueio de inválidos e histórico completo.</p></div><div class="top-actions"><span class="pill" id="statsPendente">Pendentes: 0</span><span class="pill" id="statsAprovado">Aprovados: 0</span><span id="statsIncompleto" style="background:#7c3aed;color:#fff;padding:4px 12px;border-radius:999px;font-size:13px;cursor:pointer" onclick="filtrarStatus(\'incompleto\')">Incompletos: 0</span> <span class="pill" id="statsRejeitado">Rejeitados: 0</span><a class="btn secondary" href="/simulador">Simulador</a><button class="btn secondary" onclick="carregarFila()">Atualizar</button></div></div><div id="lista" class="grid"></div></div>
<script>
function moeda(v){return Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
function formatDate(v){if(!v)return '-'; const d=new Date(v); return isNaN(d)?v:d.toLocaleString('pt-BR')}
function cardStatus(status){const map={pendente:'#f59e0b',aprovado:'#16a34a',rejeitado:'#ef4444'}; return `<span class="pill" style="border-color:${map[status]||'#263458'}">${(status||'pendente').toUpperCase()}</span>`}
function renderMarketplaces(marketplaces){const items=Object.values(marketplaces||{});if(!items.length)return '<div class="mini" style="padding:12px">Sem canais para exibir.</div>';return `<div class="table-wrap"><table><thead><tr><th>Canal</th><th>Preço promocional</th><th>Preço virtual</th><th>Dif. nominal</th><th>Dif. %</th><th>Receita líquida</th><th>Lucro</th><th>Lucro líquido</th><th>Margem</th><th>Frete</th><th>Comissão</th><th>Taxa fixa</th><th>Imposto</th><th>Custo total</th><th>Faixa aplicada</th><th>Índice final</th></tr></thead><tbody>${items.map(item=>{const raw=item.raw||{}; const promo=Number(item.preco_promocional||raw.preco_promocional||raw.preco_final||0); const virt=Number(item.preco||raw.preco_virtual||0); const difNom=Number(raw.diferenca_nominal ?? (virt-promo)); const difPct=Number(raw.diferenca_percentual ?? (promo?((virt-promo)/promo)*100:0)); const margem=Number(item.margem||raw.margem||0); return `<tr><td>${item.label||'-'}</td><td>${moeda(promo)}</td><td>${moeda(virt)}</td><td>${moeda(difNom)}</td><td>${difPct.toFixed(2)}%</td><td>${moeda(raw.receita_liquida||0)}</td><td>${moeda(item.lucro||raw.lucro||0)}</td><td>${moeda(raw.lucro_liquido||0)}</td><td class="${margem<0?'neg':''}">${margem.toFixed(2)}%</td><td>${moeda(item.frete||raw.frete||0)}</td><td>${Number(item.comissao||raw.comissao||0).toFixed(2)}</td><td>${moeda(item.taxa_fixa||raw.taxa_fixa||0)}</td><td>${moeda(item.imposto||raw.imposto||0)}</td><td>${moeda(item.custo_total||raw.custo_total||0)}</td><td>${item.faixa_aplicada||raw.faixa_aplicada||'-'}</td><td>${Number(item.indice_final||raw.indice_final||0).toFixed(2)}</td></tr>`}).join('')}</tbody></table></div>`}
function renderComponentes(aud){const comps=aud.componentes_custo||[];if(!comps.length)return '<div class="mini" style="padding:10px 0">Sem componentes detalhados.</div>';return `<div class="table-wrap"><table style="min-width:820px"><thead><tr><th>SKU componente</th><th>ID</th><th>Qtd.</th><th>Custo unitário</th><th>Subtotal</th><th>Origem busca</th><th>Origem custo</th><th>Warning</th></tr></thead><tbody>${comps.map(c=>`<tr><td>${c.sku||'-'}</td><td>${c.id||'-'}</td><td>${Number(c.quantidade||0).toFixed(2)}</td><td>${moeda(c.custo_unitario||0)}</td><td>${moeda(c.subtotal||0)}</td><td>${c.origem_busca||'-'}</td><td>${c.origem_custo||'-'}</td><td>${c.warning||'-'}</td></tr>`).join('')}</tbody></table></div>`}
async function aprovar(id){const res=await fetch(`/fila/aprovar/${id}`,{method:'POST'}); const data=await res.json(); if(data.ok){alert('Item aprovado e aplicado.'); carregarFila()} else {alert(data.detail||'Erro ao aprovar.')}}
async function rejeitar(id){const motivo=prompt('Motivo da rejeição:','Rejeitado manualmente.')||'Rejeitado manualmente.'; const res=await fetch(`/fila/rejeitar/${id}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({motivo})}); const data=await res.json(); if(data.ok){alert('Item marcado como rejeitado.'); carregarFila()} else {alert(data.detail||'Erro ao rejeitar.')}}
function renderHistorico(item){const hist=item.historico_decisao||[]; if(!hist.length)return '<div class="mini">Sem decisões registradas.</div>'; return `<div class="table-wrap"><table style="min-width:640px"><thead><tr><th>Ação</th><th>Quando</th><th>Motivo / resumo</th></tr></thead><tbody>${hist.map(h=>`<tr><td>${h.acao||'-'}</td><td>${formatDate(h.quando)}</td><td>${h.motivo || JSON.stringify(h.resultado_resumido || {})}</td></tr>`).join('')}</tbody></table></div>`}
function renderItem(item){
  if(item.status === 'incompleto') return renderItemIncompleto(item);const produto=item.produto_bling||{}; const aud=item.auditoria||{}; return `<div class="item"><div class="item-head"><div><div class="title">${item.nome || produto.nome || '[ERRO: PREVIEW INVÁLIDO]'}</div><div class="meta">${cardStatus(item.status || 'pendente')}<span class="pill">SKU ${item.sku || aud.sku || produto.codigo || '-'}</span><span class="pill">Bling ID ${produto.id || '-'}</span><span class="pill">Criado ${formatDate(item.criado_em)}</span><span class="pill">Atualizado ${formatDate(item.atualizado_em)}</span></div></div><div class="meta"><button class="btn success" onclick="aprovar('${item.id}')">Aprovar</button><button class="btn danger" onclick="rejeitar('${item.id}')">Rejeitar</button></div></div><div class="summary"><div class="metric"><div class="label">Tipo de custo</div><div class="value">${aud.tipo_custo || '-'}</div></div><div class="metric"><div class="label">Custo usado</div><div class="value">${moeda(aud.custo_usado || 0)}</div></div><div class="metric"><div class="label">Peso usado</div><div class="value">${Number(aud.peso_usado || 0).toFixed(3)}</div></div><div class="metric"><div class="label">Origem custo</div><div class="value" style="font-size:16px">${aud.origem_custo || '-'}</div></div><div class="metric"><div class="label">Melhor canal</div><div class="value" style="font-size:16px">${(item.payload_original && item.payload_original.melhor_canal) || '-'}</div></div><div class="metric"><div class="label">Fórmula</div><div class="value" style="font-size:16px">${aud.formula_version || '-'}</div></div></div><h3 style="margin:0 0 10px">Retrato multicanal</h3>${renderMarketplaces(item.marketplaces || {})}<details open><summary>Auditoria do custo e da composição</summary><div class="mini" style="margin:10px 0 12px">${aud.warning_custo || 'Sem alertas de custo.'}</div>${renderComponentes(aud)}</details><details><summary>Histórico de decisão</summary>${renderHistorico(item)}</details>
    <div style="margin-top:10px;padding-top:10px;border-top:1px solid #263458">
      <span style="font-size:11px;color:#9fb0d9;margin-right:8px">Abrir no marketplace:</span>
      <span id="links-pend-${item.id}" style="font-size:12px;color:#64748b">Carregando...</span>
    </div>
  </div>`}
async function carregarFila(){const res=await fetch('/fila/lista'); const data=await res.json(); const lista=data.itens||[]; const stats=data.stats||{pendente:0,aprovado:0,rejeitado:0}; document.getElementById('statsPendente').textContent=`Pendentes: ${stats.pendente||0}`; document.getElementById('statsAprovado').textContent=`Aprovados: ${stats.aprovado||0}`; document.getElementById('statsRejeitado').textContent=`Rejeitados: ${stats.rejeitado||0}`;
    const incEl=document.getElementById('statsIncompleto'); if(incEl) incEl.textContent=`Incompletos: ${stats.incompleto||0}`; const el=document.getElementById('lista'); if(!lista.length){el.innerHTML='<div class="empty">Nenhum item na fila.</div>'; return;} el.innerHTML=lista.map(renderItem).join('');
  lista.filter(i=>i.status==='incompleto').forEach(i=>setTimeout(()=>carregarLinksCard(i.sku,i.id),100));
  lista.filter(i=>i.status==='pendente').forEach((i,idx)=>setTimeout(()=>carregarLinksPendente(i.sku,i.id),idx*200));
}
carregarFila();

function renderItemIncompleto(item){
  const campos = item.campos_faltando || [];
  const sku = item.sku || '';
  const id = item.id || '';
  const comps = (item.dados_incompletos || {}).componentes_sem_custo || [];
  const comp_nome = comps.length > 0 ? comps[0].nome || comps[0].sku || '' : '';
  const titulo = campos.includes('peso')
    ? 'Preencha o peso do produto no Bling.'
    : campos.includes('composicao') && comp_nome
    ? `Componente sem custo: ${comp_nome}`
    : campos.includes('custo') || campos.includes('composicao')
    ? 'Preencha o preço de compra no estoque ou revise a composição do anúncio.'
    : 'Dados incompletos para precificação.';
  const tipo_campo = campos.includes('peso') ? 'peso' : 'custo';
  const label_campo = campos.includes('peso') ? 'Peso do produto (kg)' : 'Custo de compra (R$)';
  const placeholder = campos.includes('peso') ? 'ex: 0.300' : 'ex: 15.90';
  const erro_msg = item.erro_msg || '';

  return `<div class="item" style="border-left:4px solid #7c3aed" id="card-${id}">
    <div class="item-head">
      <div>
        <div class="title">${titulo}</div>
        <div class="meta">
          <span class="pill" style="background:#7c3aed;color:#fff">INCOMPLETO</span>
          <span class="pill">SKU ${sku}</span>
          <span class="pill">Criado ${formatDate(item.criado_em)}</span>
        </div>
      </div>
      <div class="meta">
        <button class="btn danger" onclick="ignorarIncompleto('${id}')">Ignorar</button>
      </div>
    </div>
    <div style="display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap;margin-top:12px">
      <div style="flex:1;min-width:260px">
        <div style="color:#f59e0b;font-weight:600;margin-bottom:8px">⚠️ Corrigir no Bling</div>
        <label style="font-size:12px;color:#9fb0d9">${label_campo}</label>
        <div style="display:flex;gap:8px;margin-top:4px">
          <input type="number" id="val-${id}" step="0.001" min="0" placeholder="${placeholder}"
            style="background:#1e293b;border:1px solid #334155;color:#eef2ff;padding:8px 12px;border-radius:6px;width:160px">
          <button class="btn success" onclick="salvarIncompleto('${id}','${sku}','${tipo_campo}')">Salvar no Bling</button>
        </div>
        ${erro_msg ? `<div style="font-size:11px;color:#64748b;margin-top:6px">Erro: ${erro_msg}</div>` : ''}
      </div>
      <div style="min-width:180px">
        <div style="font-size:12px;color:#9fb0d9;margin-bottom:6px">Consultar no marketplace:</div>
        <div id="links-${id}" style="display:flex;flex-direction:column;gap:5px">
          <span style="font-size:11px;color:#64748b">Carregando...</span>
        </div>
      </div>
    </div>
  </div>`;
}

async function salvarIncompleto(id, sku, tipo){
  const valEl = document.getElementById('val-'+id);
  const val = parseFloat(valEl?.value);
  if(!val || val <= 0){ alert('Informe um valor válido.'); return; }
  const r = await fetch('/fila/completar/'+id, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({tipo, valor:val})
  });
  const d = await r.json();
  if(d.ok){ alert(d.mensagem || 'Salvo! Será recalculado no próximo ciclo.'); carregarFila(); }
  else alert(d.detail || 'Erro ao salvar.');
}

async function ignorarIncompleto(id){
  if(!confirm('Ignorar este item? Ele voltará na próxima vez que o scheduler rodar.')) return;
  await fetch('/fila/rejeitar/'+id, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({motivo:'Ignorado manualmente.'})
  });
  carregarFila();
}

async function carregarLinksCard(sku, id){
  try{
    const r = await fetch('/fila/links/'+sku);
    if(!r.ok) return;
    const d = await r.json();
    const el = document.getElementById('links-'+id);
    if(!el) return;
    const ls = d.links || {};
    const nomes = {bling:'Bling',ml:'Mercado Livre',shopify:'Shopify',amazon:'Amazon'};
    const icons = {bling:'🔵',ml:'🟡',shopify:'🟢',amazon:'🟠'};
    el.innerHTML = Object.entries(ls).map(([k,v])=>
      `<a href="${v}" target="_blank" style="color:#4f8cff;font-size:12px;text-decoration:none">${icons[k]||'🔗'} ${nomes[k]||k}</a>`
    ).join('');
  }catch(e){}
}

function filtrarStatus(status){
  // Placeholder - poderia filtrar a lista
  carregarFila();
}

</script></body></html>
