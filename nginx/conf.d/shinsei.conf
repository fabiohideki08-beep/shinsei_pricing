# ─────────────────────────────────────────────────────────────
# nginx/conf.d/shinsei.conf
# Virtual host do Shinsei Pricing
# Substitua "seu-dominio.com" pelo domínio real antes de subir
# ─────────────────────────────────────────────────────────────

# ── Rate limiting ─────────────────────────────────────────────
# Limita a 30 req/s por IP (burst de 60 com delay)
# Endereços internos (Docker) são isentos
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

# ── Redirect HTTP → HTTPS ─────────────────────────────────────
server {
    listen 80;
    server_name seu-dominio.com www.seu-dominio.com;

    # Desafio ACME do Certbot (renovação de certificado)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Todo o resto → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS principal ───────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name seu-dominio.com www.seu-dominio.com;

    # ── Certificados TLS (Let's Encrypt via Certbot) ──────────
    ssl_certificate     /etc/letsencrypt/live/seu-dominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/seu-dominio.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/seu-dominio.com/chain.pem;

    # ── Protocolos e cifras seguras ───────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ── Headers de segurança ──────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    # Content-Security-Policy — ajuste conforme os domínios externos usados
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'" always;

    # ── Tamanho máximo de upload (para importação de Excel) ───
    client_max_body_size 10M;

    # ── Timeouts ──────────────────────────────────────────────
    proxy_connect_timeout 10s;
    proxy_read_timeout    60s;
    proxy_send_timeout    60s;

    # ── Headers repassados ao FastAPI ─────────────────────────
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── Endpoints de autenticação OAuth — rate limit mais restrito
    location ~ ^/(bling/auth|bling/callback|ml/login|ml/callback|shopee/auth) {
        limit_req zone=auth burst=10 nodelay;
        proxy_pass http://shinsei_app:8000;
    }

    # ── API endpoints — rate limit padrão ─────────────────────
    location /api/ {
        limit_req zone=api burst=60 delay=30;
        proxy_pass http://shinsei_app:8000;
    }

    # ── Health check — sem rate limit (usado por monitores) ───
    location /health {
        proxy_pass http://shinsei_app:8000/health;
        access_log off;             # não polui os logs de acesso
    }

    # ── Swagger UI e docs — restrito a IPs internos/VPN ───────
    # Descomente e ajuste para restringir acesso em produção:
    # location ~ ^/(docs|redoc|openapi.json) {
    #     allow 10.0.0.0/8;
    #     allow 192.168.0.0/16;
    #     deny all;
    #     proxy_pass http://shinsei_app:8000;
    # }
    location ~ ^/(docs|redoc|openapi.json) {
        proxy_pass http://shinsei_app:8000;
    }

    # ── Tudo o mais ───────────────────────────────────────────
    location / {
        limit_req zone=api burst=60 delay=30;
        proxy_pass http://shinsei_app:8000;

        # WebSocket support (para uvicorn com reload em dev)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Logs de acesso ────────────────────────────────────────
    access_log /var/log/nginx/shinsei_access.log combined;
    error_log  /var/log/nginx/shinsei_error.log warn;
}
