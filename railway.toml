[deploy]
startCommand = "python startup.py && python -u -c 'import sys; print(\"Python\", sys.version[:6]); import app; print(\"APP_IMPORT_OK\")' && uvicorn app:app --host 0.0.0.0 --port $PORT --workers 1 --timeout-keep-alive 30 --log-level info"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
